services:
  mongodb:
    image: mongo:latest
    container_name: mongodb_lobo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASS}
    volumes:
      - mongo_data:/data/db
    
  redis:
    image: redis:7-alpine
    container_name: redis_lobo
    restart: always
    ports:
      - "6379:6379"

volumes:
  mongo_data: